<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMOS CREATIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <div class="brand">LUMOS CREATIVE</div>
  <div class="sub-brand" id="splashSub">里面是·创意事务</div>
</div>

<!-- Header -->
<header id="header">
  <div class="logo" id="logoText" onclick="showPage('home')">LUMOS CREATIVE</div>
  <nav>
    <a onclick="showPage('home')" id="nav-home" class="active">Home</a>
    <a onclick="showPage('about')" id="nav-about">About</a>
    <div class="lang-group">
      <button class="lang-btn" id="langEN" onclick="setLang('en')">EN</button>
      <button class="lang-btn active" id="langZH" onclick="setLang('zh')">中</button>
    </div>
  </nav>
</header>

<!-- Home Page -->
<div class="page active" id="page-home">
  <div class="home-hero">
    <h1 id="heroName"></h1>
    <p id="heroSubtitle"></p>
  </div>
  <div class="categories-section" id="categoriesContainer"></div>
</div>

<!-- About Page -->
<div class="page" id="page-about">
  <div class="about-hero">
    <img class="about-photo" id="aboutPhoto" src="" alt="Profile">
    <div class="about-info">
      <h1 id="aboutName"></h1>
      <div class="about-title" id="aboutTitle"></div>
      <div class="quote" id="aboutQuote"></div>
      <div class="bio" id="aboutBio"></div>
      <div class="education" id="aboutEdu"></div>
    </div>
  </div>
  <div class="about-sections">
    <!-- Work Experience -->
    <div class="section-header" onclick="toggleSection(this)">
      <span class="triangle">△</span>
      <div class="arrow"></div>
      <h2 id="workExpHeader">work experience</h2>
    </div>
    <div class="section-content" id="workExpContainer"></div>

    <!-- Services -->
    <div class="section-header" onclick="toggleSection(this)">
      <span class="triangle">△</span>
      <div class="arrow"></div>
      <h2 id="servicesHeader">service</h2>
    </div>
    <div class="section-content" id="servicesContainer"></div>

    <!-- Contact -->
    <div class="site-footer">
      <div class="contact-links" id="contactContainer"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <button class="modal-close" onclick="closeModal()">&times;</button>
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="/js/app.js"></script>
</body>
</html>
