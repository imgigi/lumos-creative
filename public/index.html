<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMOS CREATIVE</title>
  <style>
    @font-face {
      font-family: 'PTSerif';
      src: url('/fonts/PTSerif-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSansSC';
      src: url('/fonts/NotoSansSC-VariableFont_wght.ttf') format('truetype');
      font-weight: 100 900;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSansSC';
      src: url('/fonts/NotoSansSC-Light.ttf') format('truetype');
      font-weight: 300;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSansSC';
      src: url('/fonts/NotoSansSC-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSerifSC';
      src: url('/fonts/NotoSerifSC-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: 'NotoSerifSC';
      src: url('/fonts/NotoSerifSC-Light.ttf') format('truetype');
      font-weight: 300;
      font-display: swap;
    }
  </style>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Custom Cursor Canvas -->
<canvas id="cursorCanvas"></canvas>

<!-- Header -->
<header id="header">
  <div class="header-brand" id="logoText">LUMOS CREATIVE</div>
  <nav class="nav-center">
    <a onclick="showPage('home')" id="nav-home" class="active">Projects</a>
    <a onclick="showPage('about')" id="nav-about">About</a>
  </nav>
  <div class="lang-group">
    <button class="lang-btn" id="langEN" onclick="setLang('en')">EN</button>
    <button class="lang-btn active" id="langZH" onclick="setLang('zh')">中</button>
  </div>
</header>

<!-- Home Page -->
<div class="page active" id="page-home">
  <div class="home-hero">
    <h1 id="heroName" onclick="showPage('about')"></h1>
    <p id="heroSubtitle"></p>
  </div>
  <div class="categories-section" id="categoriesContainer"></div>
</div>

<!-- About Page -->
<div class="page" id="page-about">
  <div class="about-hero">
    <img class="about-photo" id="aboutPhoto" src="" alt="Profile">
    <div class="about-info">
      <h1 id="aboutName"></h1>
      <div class="about-title" id="aboutTitle"></div>
      <div class="quote" id="aboutQuote"></div>
      <div class="bio" id="aboutBio"></div>
      <div class="education" id="aboutEdu"></div>
      <div class="awards" id="aboutAwards"></div>
    </div>
  </div>
  <!-- About Images -->
  <div class="about-images-section" id="aboutImagesContainer"></div>

  <div class="about-sections">
    <!-- Work Experience -->
    <div class="section-header open" onclick="toggleSection(this)">
      <div class="arrow"></div>
      <h2 id="workExpHeader"></h2>
    </div>
    <div class="section-content open" id="workExpContainer"></div>

    <!-- Services / Professional Field -->
    <div class="section-header open" onclick="toggleSection(this)">
      <div class="arrow"></div>
      <h2 id="servicesHeader"></h2>
    </div>
    <div class="section-content open" id="servicesContainer"></div>

    <!-- Contact -->
    <div class="site-footer">
      <div class="contact-links" id="contactContainer"></div>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <button class="modal-close" onclick="closeModal()">&times;</button>
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">&times;</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script src="/js/app.js"></script>
</body>
</html>
